<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <title>Image Switcher</title>
    <script type="text/javascript">
      function changeImage(imageNumber) {
        var img = document.getElementById("mainImage");

        if (imageNumber === 1) {
          img.src =
            "https://via.placeholder.com/300x200/ff9999/000000?text=Image+1";
        } else if (imageNumber === 2) {
          img.src =
            "https://via.placeholder.com/300x200/99ccff/000000?text=Image+2";
        } else if (imageNumber === 3) {
          img.src =
            "https://via.placeholder.com/300x200/99ff99/000000?text=Image+3";
        }
      }
    </script>
  </head>
  <body>
    <h2>Switch Images by Clicking a Button</h2>

    <img
      id="mainImage"
      src="https://via.placeholder.com/300x200/ff9999/000000?text=Image+1"
      alt="Switchable Image"
    />

    <br /><br />
    <button onclick="changeImage(1)">1</button>
    <button onclick="changeImage(2)">2</button>
    <button onclick="changeImage(3)">3</button>
  </body>
</html>
